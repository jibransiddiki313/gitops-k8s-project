apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    rule_files:
      - "/etc/prometheus/alerts/*.yaml"

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true

      - job_name: 'gitops-demo-app'
        static_configs:
          - targets: ['gitops-demo-app-svc.dev:80', 'gitops-demo-app-svc.staging:80', 'gitops-demo-app-svc.prod:80']
        metrics_path: /metrics
---
# Alert Rules
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  app-alerts.yaml: |
    groups:
      - name: gitops-demo-app
        rules:
          - alert: AppDown
            expr: up{job="gitops-demo-app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "App is DOWN!"
              description: "gitops-demo-app has been down for > 1 minute"

          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High error rate detected"
              description: "Error rate > 10% for 2 minutes"
